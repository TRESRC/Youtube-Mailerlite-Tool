name: YouTube → MailerLite Email Automation

on:
  # ── Scheduled: runs every hour ──────────────────────────────────────────────
  schedule:
    - cron: "0 * * * *"   # Every hour on the hour (UTC)

  # ── Manual trigger from GitHub UI ────────────────────────────────────────────
  workflow_dispatch:

jobs:
  create-email-campaign:
    name: Check YouTube & Create MailerLite Draft
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout the repo (needed to read/write seen_videos.json)
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # 2. Set up Python
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 3. Install dependencies
      - name: Install dependencies
        run: pip install requests

      # 4. Run the automation script
      - name: Run automation
        env:
          YOUTUBE_API_KEY:     ${{ secrets.YOUTUBE_API_KEY }}
          YOUTUBE_CHANNEL_ID:  ${{ secrets.YOUTUBE_CHANNEL_ID }}
          WP_BASE_URL:         ${{ secrets.WP_BASE_URL }}
          WP_USERNAME:         ${{ secrets.WP_USERNAME }}
          WP_APP_PASSWORD:     ${{ secrets.WP_APP_PASSWORD }}
          MAILERLITE_API_KEY:  ${{ secrets.MAILERLITE_API_KEY }}
          MAILERLITE_GROUP_ID: ${{ secrets.MAILERLITE_GROUP_ID }}
          FROM_NAME:           ${{ secrets.FROM_NAME }}
          FROM_EMAIL:          ${{ secrets.FROM_EMAIL }}
        run: python scripts/run.py

      # 5. Commit the updated seen_videos.json so duplicates are avoided
      - name: Save processed video IDs
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add seen_videos.json
          git diff --staged --quiet || git commit -m "chore: update seen_videos.json [skip ci]"
          git push
