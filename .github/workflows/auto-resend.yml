name: Auto-Resend to Non-Openers

on:
  schedule:
    - cron: '0 * * * *'  # Every hour
  workflow_dispatch:       # Manual trigger for testing
    inputs:
      test_campaign_id:
        description: 'Campaign ID to test resend against (leave blank for normal hourly run)'
        required: false
        default: ''
      dry_run:
        description: 'Dry run — log what would happen without actually sending (true/false)'
        required: false
        default: 'true'

jobs:
  auto-resend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests --break-system-packages

      - name: Run auto-resend check
        env:
          MAILERLITE_API_KEY:  ${{ secrets.MAILERLITE_API_KEY }}
          TEST_CAMPAIGN_ID:    ${{ inputs.test_campaign_id }}
          DRY_RUN:             ${{ inputs.dry_run || 'false' }}
        run: python scripts/auto_resend.py
